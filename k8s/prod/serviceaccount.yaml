# ServiceAccount com IRSA (IAM Roles for Service Accounts) para acesso ao S3.
# O ACCOUNT_ID é substituído automaticamente pelo deploy-eks.ps1.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: optimus-frame-core-sa
  labels:
    app.kubernetes.io/name: optimus-frame-core
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: optimus-frame
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::848144920968:role/optimus-frame-core-role

# Pull secret para autenticar no GHCR e fazer pull de imagens privadas.
# Namespace é definido pelo kustomization.yaml (namespace: production).
#
# ATENÇÃO: Não commite este arquivo com o token preenchido.
# Adicione k8s/prod/ghcr-secret.yaml ao .gitignore.
# O token pode ser gerado em: GitHub > Settings > Developer Settings > Tokens (read:packages)
#
# Para regenerar o .dockerconfigjson:
#   $json = '{"auths":{"ghcr.io":{"username":"SEU_USER","password":"SEU_TOKEN","auth":"' `
#     + [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("SEU_USER:SEU_TOKEN")) + '"}}}'
#   [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($json))
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: 

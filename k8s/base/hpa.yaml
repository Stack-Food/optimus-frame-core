apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: optimus-frame-core-hpa
  labels:
    app.kubernetes.io/name: optimus-frame-core
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: optimus-frame-core
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
# Garante ao menos 1 pod ativo durante drain de nó / rolling update
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: optimus-frame-core-pdb
  labels:
    app.kubernetes.io/name: optimus-frame-core
    app.kubernetes.io/component: api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: optimus-frame-core

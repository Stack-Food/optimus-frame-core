apiVersion: apps/v1
kind: Deployment
metadata:
  name: optimus-frame-core
  labels:
    app.kubernetes.io/name: optimus-frame-core
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: optimus-frame
    app: optimus-frame-core
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: optimus-frame-core
      app: optimus-frame-core
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: optimus-frame-core
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: optimus-frame
        app: optimus-frame-core
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      serviceAccountName: optimus-frame-core-sa
      containers:
        - name: optimus-frame-core
          # A tag é sobrescrita pelo overlay prod/kustomization.yaml
          image: ghcr.io/stack-food/dev-optimus-frame-core:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          # Todas as variáveis de ambiente vêm do ConfigMap + Secret via envFrom
          envFrom:
            - configMapRef:
                name: optimus-frame-core-config
            - secretRef:
                name: optimus-frame-core-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 12
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      securityContext:
        fsGroup: 1000
      terminationGracePeriodSeconds: 60

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: optimus-frame-postgres
    environment:
      POSTGRES_DB: optimus-frame_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stackfood-network

  optimus-frame-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: optimus-frame-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=optimus-frame_db;Username=postgres;Password=postgres
      - AWS__Region=us-east-1
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stackfood-network

volumes:
  postgres_data:

networks:
  stackfood-network:
    driver: bridge

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: optimus-frame-postgres
    environment:
      POSTGRES_DB: optimusframe_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d optimusframe_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stackfood-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: optimus-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stackfood-network

  optimus-frame-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: optimus-frame-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=optimus-frame_db;Username=postgres;Password=postgres
      - AWS__Region=us-east-1
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=guest
      - RabbitMQ__Password=guest
      - RabbitMQ__VirtualHost=/
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - stackfood-network

volumes:
  postgres_data:

networks:
  stackfood-network:
    driver: bridge

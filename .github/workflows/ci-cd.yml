name: CI/CD - OptimusFrame Core Microservice

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
env:
  DOTNET_VERSION: '8.0.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: optimusframe-core

jobs:

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore OptimusFrame.Core.sln

      - name: Build solution
        run: dotnet build OptimusFrame.Core.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test OptimusFrame.Core.sln --configuration Release --no-build --collect:"XPlat Code Coverage" --results-directory ./TestResults/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: '**/coverage.cobertura.xml'

  docker-build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Set lowercase repository owner
        run: echo "REPO_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build \
            -f src/OptimusFrame.Core.API/Dockerfile \
            -t $REGISTRY/$REPO_OWNER/$IMAGE_NAME:latest \
            .

      - name: Push Docker Image
        run: |
          docker push $REGISTRY/$REPO_OWNER/$IMAGE_NAME:latest
